<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>File Download Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <div class="glass-container">

        <button class="btn-icon-absolute" id="btnSetting" onclick="showSettingsModal()" title="App Settings">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>

        <button class="btn-icon-absolute-left" id="btnHistory" onclick="showHistoryModal()" title="Download History">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                <path d="M3 3v5h5"></path>
                <path d="M12 7v5l4 2"></path>
            </svg>
        </button>

        <div class="header">
            <svg viewBox="0 0 24 24" fill="none" class="app-icon" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            <h1>File Download Manager</h1>
            <p class="subtitle">Download YouTube videos fast and reliably</p>
        </div>

        <div class="dir-status" style="margin-bottom: 0.8rem;">
            Target Folder: <strong id="dirPathText" class="selectable-text">Loading OS default...</strong>
        </div>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Paste YouTube Video URL here..." autocomplete="off">
            <button class="btn-primary" onclick="prepareDownload()">Download</button>
        </div>



        <!-- advanced mode completely moved to pop-up modal -->

        <div id="downloadsList" class="downloads-container" style="margin-top: 24px;">
            <!-- Kartu hasil Multi-Download akan di-generate otomatis oleh JavaScript di sini -->
        </div>

    </div>



    <!-- Confirm Download Modal -->
    <div id="confirmDownloadModal" class="modal-overlay" style="display: none; z-index: 1050;">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2>Confirm Download</h2>
                <button class="btn-close-modal" onclick="closeConfirmModal()">&times;</button>
            </div>
            <div class="modal-body" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
                <div class="adv-group">
                    <label>File URL Link:</label>
                    <input type="text" id="cdUrl" readonly style="width: 100%; background: var(--bg-dark); color: var(--text-muted); border: 1px solid var(--border-light); padding: 0.5rem; border-radius: 4px;">
                </div>
                <div class="adv-group">
                    <label>Save As (Filename):</label>
                    <input type="text" id="cdFilename" style="width: 100%; background: var(--bg-main); color: var(--text-main); border: 1px solid var(--border-light); padding: 0.5rem; border-radius: 4px;">
                </div>
                <div class="adv-group">
                    <label>Save Location:</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="cdFolder" readonly style="flex: 1; background: var(--bg-dark); color: var(--text-muted); border: 1px solid var(--border-light); padding: 0.5rem; border-radius: 4px;">
                        <button class="btn-primary" onclick="changeDownloadDir()" style="white-space: nowrap;">Change Folder</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="padding: 1rem 1.5rem; border-top: 1px solid var(--border-light); display: flex; justify-content: flex-end; gap: 1rem;">
                <button class="btn-warning" onclick="closeConfirmModal()" style="background: transparent; color: var(--text-main); border: 1px solid var(--border-light);">Cancel</button>
                <button class="btn-success" onclick="startConfirmedDownload()">Start Download</button>
            </div>
        </div>
    </div>

    <!-- History Modal Pop-screen -->
    <div id="historyModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <h2 style="margin: 0;">Download History</h2>
                    <button id="btnClearHistory" class="btn-danger" onclick="clearAllHistory()" style="padding: 0; min-width: unset; width: 32px; height: 32px; display: none; align-items: center; justify-content: center;" title="Clear All History">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 6h18"></path>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                    </button>
                </div>
                <button class="btn-close-modal" onclick="closeHistoryModal()">&times;</button>
            </div>
            <div id="historyListContainer" class="history-list">
                <!-- History elements rendered here -->
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h2>App Settings</h2>
                <button class="btn-close-modal" onclick="closeSettingsModal()">&times;</button>
            </div>
            <div class="modal-body" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="setting-item">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-muted); font-weight: 600;">Default Download Folder</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="settingDirText" readonly style="flex: 1; background: var(--bg-dark); color: var(--text-muted); border: 1px solid var(--border-light); padding: 0.5rem; border-radius: 4px;">
                        <button class="btn-primary" onclick="changeDownloadDir()" style="white-space: nowrap;">Change Folder</button>
                    </div>
                </div>
                
                <div class="setting-item" style="border-top: 1px solid var(--border-light); padding-top: 1.5rem;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-muted); font-weight: 600;">Browser Integration</label>
                    <button class="btn-success" onclick="installExtensionUI()" style="width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; padding: 0.75rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="app-icon" stroke="currentColor" stroke-width="2" style="margin: 0;"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="4"></circle><line x1="21.17" y1="8" x2="12" y2="8"></line><line x1="3.95" y1="6.06" x2="8.54" y2="14"></line><line x1="10.88" y1="21.94" x2="15.46" y2="14"></line></svg>
                        Install / Setup Chrome Extension
                    </button>
                    <p style="margin-top: 8px; font-size: 0.8rem; color: var(--text-muted); line-height: 1.4;">Integrating the extension allows this app to automatically grab huge files and cookies directly from Google Chrome securely.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/neutralino.js"></script>
    <script src="/js/main.js"></script>
</body>

</html>
