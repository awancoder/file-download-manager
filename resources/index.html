<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>File Download Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <div class="glass-container">

        <!-- New Toolbar and Action Bar layout -->
        <div class="action-bar-container"
            style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.15); padding: 0.5rem 1rem; border-bottom: 1px solid var(--border-light); flex-shrink: 0;">
            <div class="action-bar" style="display: flex; gap: 0.3rem; align-items: center; margin: 0;">
                <button class="btn-icon-action" onclick="showAddModal()" title="Add New Download">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>Add Link</span>
                </button>
                <button class="btn-icon-action" onclick="torrentToggleMenu(this)" title="Torrent Download">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="8"></circle>
                        <circle cx="5" cy="5" r="1"></circle>
                        <circle cx="19" cy="5" r="1"></circle>
                        <circle cx="19" cy="19" r="1"></circle>
                        <circle cx="5" cy="19" r="1"></circle>
                    </svg>
                    <span>Torrent</span>
                </button>
                <input type="file" id="torrentFileInput" accept=".torrent" style="display: none;"
                    onchange="handleTorrentFileImport(event)">
                <button class="btn-icon-action" id="btnSetting" onclick="showSettingsPage()" title="App Settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                    <span>Options</span>
                </button>
                <button class="btn-icon-action" onclick="helpToggleMenu(this)" title="Help Options"
                    style="color: var(--accent-secondary);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                    </svg>
                    <span>Help</span>
                </button>
                <button class="btn-icon-action" id="btnExit" onclick="exitApp()" title="Exit Application"
                    style="color: #ef4444;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Exit</span>
                </button>
            </div>


            <div class="dir-status"
                style="font-size: 0.75rem; color: var(--text-muted); text-align: right; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                Save to: <strong id="dirPathText" class="selectable-text">OS default...</strong>
            </div>
        </div>

        <div class="table-container" style="flex: 1; margin-top: 0; width: 100%; overflow-y: auto;">
            <table class="downloads-table">
                <thead>
                    <tr>
                        <th id="col_file" style="width: 28%; position: relative; cursor: pointer; user-select: none;"
                            onclick="toggleSort('file')"><span class="sort-header">File</span></th>
                        <th id="col_size" style="width: 12%; position: relative;">Size</th>
                        <th id="col_speed" style="width: 10%; position: relative;">Speed</th>
                        <th id="col_seeders" style="width: 7%; position: relative;">Peers</th>
                        <th id="col_status" style="width: 13%; position: relative; cursor: pointer; user-select: none;"
                            onclick="toggleSort('status')"><span class="sort-header">Status</span></th>
                        <th id="col_progress"
                            style="width: 13%; position: relative; cursor: pointer; user-select: none;"
                            onclick="toggleSort('progress')"><span class="sort-header">Progress</span></th>
                        <th id="col_date" style="width: 12%; position: relative; cursor: pointer; user-select: none;"
                            onclick="toggleSort('date')"><span class="sort-header">Date</span></th>
                        <th id="col_action" style="width: 12%; text-align: right; position: relative;">Action</th>
                    </tr>
                </thead>
                <tbody id="downloadsList">
                    <!-- Baris tabel akan di-generate otomatis oleh JavaScript di sini -->
                </tbody>
            </table>
        </div>

        <div id="terminalPanel"
            style="display: none; flex-direction: column; height: 250px; background: #000; border-top: 1px solid var(--border-light); z-index: 10; flex-shrink: 0; position: relative;">
            <div id="terminalResizer"
                style="height: 6px; width: 100%; cursor: ns-resize; position: absolute; top: -3px; left: 0; z-index: 20; background: transparent;">
            </div>
            <div
                style="display: flex; justify-content: space-between; align-items: center; background: #111; padding: 0.3rem 1rem; border-bottom: 1px solid #333;">
                <span
                    style="font-size: 0.75rem; color: #888; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;">Extension
                    Log Terminal</span>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-icon-action" onclick="refreshTerminalLog()" title="Refresh Output"
                        style="padding: 0.1rem; height: auto;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>
                    <button class="btn-icon-action" onclick="toggleTerminal()" title="Close Terminal"
                        style="padding: 0.1rem; height: auto;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="terminalOutput" class="custom-scrollbar"
                style="flex: 1; overflow-y: auto; padding: 0.5rem; font-family: 'Consolas', 'Courier New', monospace; font-size: 0.8rem; color: #ccc; white-space: pre-wrap; word-break: break-all; user-select: text; -webkit-user-select: text;">
            </div>
        </div>

        <div class="pagination-controls"
            style="display: flex; justify-content: space-between; padding: 0.5rem 1rem; border-top: 1px solid var(--border-light); align-items: center; background: rgba(0,0,0,0.15); flex-shrink: 0;">
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <button class="btn-primary" id="btnPrevPage" onclick="prevPage()"
                    style="padding: 0.25rem 0.4rem; min-width: unset; line-height: 0;" disabled
                    title="Previous Page"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg></button>
                <button class="btn-primary" id="btnNextPage" onclick="nextPage()"
                    style="padding: 0.25rem 0.4rem; min-width: unset; line-height: 0;" disabled title="Next Page"><svg
                        xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg></button>
                <span id="pageInfo" style="font-size: 0.8rem; color: var(--text-muted);">Page 1 of 1</span>
            </div>
            <div style="display: flex; align-items: center; gap: 0.8rem;">
                <div id="appStatsContainer" class="app-stats-widget" style="margin: 0; padding: 0;"></div>
                <button class="btn-icon-action" onclick="toggleTerminal()" title="Toggle Log Terminal"
                    style="padding: 0.2rem 0.4rem; line-height: 0; height: auto;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
                        <polyline points="6 9 10 12 6 15"></polyline>
                        <line x1="12" y1="15" x2="18" y2="15"></line>
                    </svg>
                </button>
            </div>
        </div>



        <!-- Add Download Modal -->
        <div id="addDownloadModal" class="modal-overlay" style="display: none; z-index: 1060;">
            <div class="modal-content" style="max-width: 450px;">
                <div class="modal-header">
                    <h2>Add New Download</h2>
                    <button class="btn-close-modal" onclick="closeAddModal()">&times;</button>
                </div>
                <div class="modal-body" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
                    <div class="adv-group">
                        <label style="margin-bottom: 0.5rem; color: var(--text-muted); font-weight: 600;">Download Link
                            (URL):</label>
                        <input type="text" id="addUrlInput" placeholder="Paste Download Link here..."
                            autocomplete="off">
                    </div>
                </div>
                <div class="modal-footer"
                    style="padding: 1rem 1.5rem; border-top: 1px solid var(--border-light); display: flex; justify-content: flex-end; gap: 1rem;">
                    <button class="btn-warning" onclick="closeAddModal()"
                        style="background: transparent; color: var(--text-main); border: 1px solid var(--border-light);">Cancel</button>
                    <button class="btn-primary" onclick="submitAddUrl()">Proceed</button>
                </div>
            </div>
        </div>

        <!-- Confirm Download Modal -->
        <div id="confirmDownloadModal" class="modal-overlay" style="display: none; z-index: 1050;">
            <div class="modal-content" style="max-width: 500px;">
                <div class="modal-header">
                    <h2>Confirm Download</h2>
                    <button class="btn-close-modal" onclick="closeConfirmModal()">&times;</button>
                </div>
                <div class="modal-body" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
                    <div class="adv-group">
                        <label>File URL Link:</label>
                        <input type="text" id="cdUrl" readonly
                            style="width: 100%; background: var(--bg-dark); color: var(--text-muted); border: 1px solid var(--border-light); padding: 0.5rem; border-radius: 4px;">
                    </div>
                    <div class="adv-group">
                        <label>Download Type:</label>
                        <div style="padding: 0.5rem; background: var(--bg-dark); border: 1px solid var(--border-light); border-radius: 4px; color: var(--text-muted);"
                            id="cdDownloadType">
                            🌐 HTTP
                        </div>
                    </div>
                    <div class="adv-group">
                        <label>Save As (Filename):</label>
                        <input type="text" id="cdFilename"
                            style="width: 100%; background: var(--bg-main); color: var(--text-main); border: 1px solid var(--border-light); padding: 0.5rem; border-radius: 4px;">
                    </div>
                    <div class="adv-group">
                        <label>Save Location:</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="cdFolder" readonly
                                style="flex: 1; background: var(--bg-dark); color: var(--text-muted); border: 1px solid var(--border-light); padding: 0.5rem; border-radius: 4px;">
                            <button class="btn-primary" onclick="changeDownloadDir()"
                                style="white-space: nowrap;">Change Folder</button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer"
                    style="padding: 1rem 1.5rem; border-top: 1px solid var(--border-light); display: flex; justify-content: flex-end; gap: 1rem;">
                    <button class="btn-warning" onclick="closeConfirmModal()"
                        style="background: transparent; color: var(--text-main); border: 1px solid var(--border-light);">Cancel</button>
                    <button class="btn-success" onclick="startConfirmedDownload()">Start Download</button>
                </div>
            </div>
        </div>

        <!-- History Modal Removed -->

        <!-- Settings Page -->
        <div id="settingsPage"
            style="display: none; position: absolute; inset: 0; background: var(--bg-main); z-index: 1000; flex-direction: column; border-radius: inherit;">
            <div id="settingsContent" style="flex: 1; display: flex; flex-direction: column; overflow-y: hidden;"></div>
        </div>

        <script src="/js/neutralino.js"></script>
        <script src="/app-stats/app-stats.js"></script>
        <script src="/options/options.js"></script>
        <script src="/torrent/torrent.js"></script>
        <script src="/info/info.js"></script>
        <script src="/about/about.js"></script>
        <script src="/terminal/terminal.js"></script>
        <script src="/js/main.js"></script>
</body>

</html>
